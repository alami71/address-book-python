{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 m-0">Envoyer Email</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Retour</a>
</div>

<form class="bg-white border rounded p-4" action="{{ url_for('email_contact', contact_id=contact['id']) }}" method="post">
    <div class="mb-3">
        <label class="form-label">Contact</label>
        <input class="form-control" value="{{ contact['name'] }} - {{ contact['email'] }}" disabled>
    </div>
    <div class="mb-3">
        <label class="form-label" for="subject">Sujet</label>
        <input class="form-control" id="subject" name="subject" required>
    </div>
    <div class="mb-3">
        <label class="form-label" for="body">Message</label>
        <textarea class="form-control" id="body" name="body" rows="6" required></textarea>
    </div>
    <button class="btn btn-primary" type="submit">Envoyer Email</button>
</form>
{% endblock %}
