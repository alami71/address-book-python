{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 m-0">Envoyer WhatsApp</h1>
    <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Retour</a>
</div>

<form class="bg-white border rounded p-4" action="{{ url_for('whatsapp_contact', contact_id=contact['id']) }}" method="post">
    <div class="mb-3">
        <label class="form-label">Contact</label>
        <input class="form-control" value="{{ contact['name'] }} - {{ contact['phone'] }}" disabled>
    </div>
    <div class="mb-3">
        <label class="form-label" for="message">Message</label>
        <textarea class="form-control" id="message" name="message" rows="6" required></textarea>
    </div>
    <button class="btn btn-success" type="submit">Envoyer WhatsApp</button>
</form>
{% endblock %}
